services:
  postgres:
    image: postgres:15-alpine
    container_name: taskboard_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: taskboard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskboard_network

  neo4j:
    image: neo4j:5-community
    container_name: taskboard_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/taskboard
    volumes:
      - neo4j_data:/data
    networks:
      - taskboard_network

volumes:
  pg_data:
  neo4j_data:

networks:
  taskboard_network:
    driver: bridge
