services:
  postgres:
    image: postgres:15-alpine
    container_name: taskboard_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: taskboard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskboard_network
volumes:
  pg_data:

networks:
  taskboard_network:
    driver: bridge